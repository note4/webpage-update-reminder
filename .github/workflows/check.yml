name: webpage-update-reminder

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
  push:
    paths:
      - "check.py"
      - "config.yml"
      - ".github/workflows/**"
    
  # ⭐ 保活触发（关键）
  repository_dispatch:
    types: [keepalive]

# ✅ 防止并发冲突
concurrency:
  group: webpage-monitor
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    # ⭐ 全局超时（防卡死）
    timeout-minutes: 6

    steps:
      # 1️⃣ 拉代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_TOKEN }}
          fetch-depth: 0

      # 2️⃣ 设置时区（关键新增）
      - name: Set timezone
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          date

      # 3️⃣ Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 4️⃣ 缓存 pip
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-v3   # ⭐ 再升级缓存key
          restore-keys: |
            pip-${{ runner.os }}

      # 5️⃣ 安装依赖
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pyyaml beautifulsoup4 lxml feedparser

      # 6️⃣ 验证依赖
      - name: Verify deps
        run: |
          python -c "import yaml, bs4, lxml, feedparser; print('deps ok')"

      # 7️⃣ 初始化 data.json
      - name: Init state file
        run: |
          if [ ! -f data.json ]; then
            echo "{}" > data.json
          fi

      # 8️⃣ 执行脚本（增强重试 + 超时保护）
      - name: Run script
        run: |
          timeout 300 python check.py || (echo "retry..." && sleep 5 && timeout 300 python check.py)

      # 9️⃣ 提交状态（增强稳定性）
      - name: Commit state
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json

          # 没变化直接退出
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "update state"

          # ⭐ 防冲突推送（更稳）
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref_name }} || echo "push failed, skip"